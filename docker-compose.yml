version: "3.9"
services:
  nvidia-resource-suite:
    build: .
    ports:
      - "7760:7760"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_NIM_BASE_URL=${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - OMNIVERSE_NUCLEUS_URL=${OMNIVERSE_NUCLEUS_URL:-omniverse://localhost}
      - DEEPFLEX_BASE_URL=${DEEPFLEX_BASE_URL:-http://host.docker.internal:8000}
      - NVIDIA_SUITE_PORT=7760
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7760/health"]
      interval: 30s
      timeout: 10s
      retries: 3
