version: "3.9"

# ============================================================
# NVIDIA Resource Suite — Full Stack
# docker-compose up --gpus all
# ============================================================

services:

  # --- Main API Server ---
  api:
    build: .
    command: uvicorn api_server:app --host 0.0.0.0 --port 7760 --reload
    ports:
      - "7760:7760"
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/app
    networks:
      - nvidia-net

  # --- NVIDIA Triton Inference Server ---
  triton:
    image: nvcr.io/nvidia/tritonserver:24.05-py3
    command: tritonserver --model-repository=/models --allow-metrics=true
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    volumes:
      - ./model_repository:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - nvidia-net
    profiles: [triton]

  # --- Omniverse Nucleus (local dev) ---
  nucleus:
    image: nvcr.io/nvidia/omniverse/nucleus-server:latest
    ports:
      - "3009:3009"
      - "3010:3010"
    volumes:
      - nucleus_data:/nucleus
    networks:
      - nvidia-net
    profiles: [omniverse]

  # --- Vector DB for RAG ---
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8020:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - nvidia-net

  # --- MCP Server ---
  mcp:
    build: .
    command: python mcp_server/nvidia_mcp_server.py
    env_file: .env
    stdin_open: true
    tty: true
    networks:
      - nvidia-net
    profiles: [mcp]

volumes:
  nucleus_data:
  chroma_data:

networks:
  nvidia-net:
    driver: bridge
